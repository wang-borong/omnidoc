[project]
entry = "main.md"
from = "markdown"
target = "golden-book"

[build]
outdir = "build"
outputs = ["html", "epub"]

[pandoc]
css = "engineering-book.css"
epub_css = "engineering-book.css"
lang = "zh-CN"

[pandoc.format_options]
html = ["--toc", "--toc-depth=3"]
epub = ["--toc", "--toc-depth=3"]
