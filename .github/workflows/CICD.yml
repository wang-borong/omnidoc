name: CICD

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CICD_INTERMEDIATES_DIR: _cicd-intermediates
  PANDOC_VERSION: '3.10'
  PANDOC_CROSSREF_VERSION: '0.3.24'

jobs:
  all-jobs:
    name: all-jobs
    runs-on: ubuntu-latest
    if: always()
    needs:
      - crate-metadata
      - quality
      - golden-book
      - portable-document-smoke
      - msrv
      - audit
      - package
    steps:
      - name: Verify required jobs
        run: jq --exit-status 'all(.result == "success")' <<< '${{ toJson(needs) }}'

  crate-metadata:
    name: Extract crate metadata
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.metadata.outputs.name }}
      version: ${{ steps.metadata.outputs.version }}
      maintainer: ${{ steps.metadata.outputs.maintainer }}
      homepage: ${{ steps.metadata.outputs.homepage }}
      msrv: ${{ steps.metadata.outputs.msrv }}
      library_revision: ${{ steps.metadata.outputs.library_revision }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Extract metadata
        id: metadata
        shell: bash
        run: |
          metadata="$(cargo metadata --no-deps --format-version 1)"
          jq -r '"name=" + .packages[0].name' <<< "$metadata" >> "$GITHUB_OUTPUT"
          jq -r '"version=" + .packages[0].version' <<< "$metadata" >> "$GITHUB_OUTPUT"
          jq -r '"maintainer=" + .packages[0].authors[0]' <<< "$metadata" >> "$GITHUB_OUTPUT"
          jq -r '"homepage=" + .packages[0].homepage' <<< "$metadata" >> "$GITHUB_OUTPUT"
          jq -r '"msrv=" + .packages[0].rust_version' <<< "$metadata" >> "$GITHUB_OUTPUT"
          python3 -c 'import tomllib; print("library_revision=" + tomllib.load(open("release/omnidoc-libs.toml", "rb"))["library"]["revision"])' >> "$GITHUB_OUTPUT"

  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
      - name: Format
        run: cargo fmt -- --check
      - name: Check
        run: cargo check --locked --all-targets --all-features
      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features
      - name: Test
        run: cargo test --locked --all-targets --all-features
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --no-deps --document-private-items --all-features
      - name: CLI smoke
        shell: bash
        run: |
          cargo run --locked -- --help
          cargo run --locked -- build --help
          cargo run --locked -- watch --help
          cargo run --locked -- publish --help
          cargo run --locked -- lock --help
          cargo run --locked -- lib --help
          cargo run --locked -- theme --help
          cargo run --locked -- plugin --help

  golden-book:
    name: Golden Book (HTML and EPUB)
    runs-on: ubuntu-latest
    needs: crate-metadata
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: wang-borong/omnidoc-libs
          path: omnidoc-libs
          ref: ${{ startsWith(github.ref, 'refs/tags/v') && needs.crate-metadata.outputs.library_revision || 'main' }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e # v1
        with:
          version: ${{ env.PANDOC_VERSION }}
      - name: Install integration dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y epubcheck jq libssl-dev pkg-config ripgrep unzip xz-utils
          curl --fail --location --retry 3 \
            --output /tmp/pandoc-crossref.tar.xz \
            "https://github.com/lierdakil/pandoc-crossref/releases/download/v${PANDOC_CROSSREF_VERSION}/pandoc-crossref-Linux-X64.tar.xz"
          tar --extract --xz --file /tmp/pandoc-crossref.tar.xz --directory /tmp pandoc-crossref
          sudo install -m 0755 /tmp/pandoc-crossref /usr/local/bin/pandoc-crossref
      - name: Report document toolchain
        run: |
          pandoc --version
          pandoc-crossref --version
          epubcheck --version || true
      - name: Verify OmniDoc and library release contract
        run: python3 scripts/check-library-contract.py omnidoc-libs
      - name: Build and verify Golden Book
        env:
          OMNIDOC_LIBS: ${{ github.workspace }}/omnidoc-libs
        run: scripts/check-golden-book.sh

  golden-pdf:
    name: Golden Book (PDF)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: crate-metadata
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: wang-borong/omnidoc-libs
          path: omnidoc-libs
          ref: ${{ startsWith(github.ref, 'refs/tags/v') && needs.crate-metadata.outputs.library_revision || 'main' }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e # v1
        with:
          version: ${{ env.PANDOC_VERSION }}
      - name: Install PDF integration dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-noto-cjk jq libssl-dev pkg-config poppler-utils ripgrep \
            texlive-fonts-recommended texlive-lang-chinese texlive-latex-extra \
            texlive-xetex xz-utils
          curl --fail --location --retry 3 \
            --output /tmp/pandoc-crossref.tar.xz \
            "https://github.com/lierdakil/pandoc-crossref/releases/download/v${PANDOC_CROSSREF_VERSION}/pandoc-crossref-Linux-X64.tar.xz"
          tar --extract --xz --file /tmp/pandoc-crossref.tar.xz --directory /tmp pandoc-crossref
          sudo install -m 0755 /tmp/pandoc-crossref /usr/local/bin/pandoc-crossref
      - name: Report PDF toolchain
        run: |
          pandoc --version
          pandoc-crossref --version
          xelatex --version
          fc-match "Noto Serif CJK SC"
      - name: Build and verify Golden PDF
        env:
          OMNIDOC_LIBS: ${{ github.workspace }}/omnidoc-libs
          OMNIDOC_PDF_VISUAL_DIR: ${{ github.workspace }}/${{ env.CICD_INTERMEDIATES_DIR }}/golden-pdf-visual
        run: scripts/check-golden-pdf.sh
      - name: Upload Golden PDF visual diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: golden-pdf-visual-${{ github.run_attempt }}
          path: ${{ env.CICD_INTERMEDIATES_DIR }}/golden-pdf-visual
          if-no-files-found: warn
          retention-days: 14

  portable-document-smoke:
    name: Document smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: crate-metadata
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: wang-borong/omnidoc-libs
          path: omnidoc-libs
          ref: ${{ startsWith(github.ref, 'refs/tags/v') && needs.crate-metadata.outputs.library_revision || 'main' }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e # v1
        with:
          version: ${{ env.PANDOC_VERSION }}
      - name: Install pandoc-crossref
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/crossref"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            curl --fail --location --retry 3 \
              --output "$RUNNER_TEMP/pandoc-crossref.7z" \
              "https://github.com/lierdakil/pandoc-crossref/releases/download/v${PANDOC_CROSSREF_VERSION}/pandoc-crossref-Windows-X64.7z"
            7z x -y "$RUNNER_TEMP/pandoc-crossref.7z" "-o$RUNNER_TEMP/crossref"
          else
            curl --fail --location --retry 3 \
              --output "$RUNNER_TEMP/pandoc-crossref.tar.xz" \
              "https://github.com/lierdakil/pandoc-crossref/releases/download/v${PANDOC_CROSSREF_VERSION}/pandoc-crossref-macOS-X64.tar.xz"
            tar --extract --xz --file "$RUNNER_TEMP/pandoc-crossref.tar.xz" \
              --directory "$RUNNER_TEMP/crossref" pandoc-crossref
            chmod +x "$RUNNER_TEMP/crossref/pandoc-crossref"
          fi
          echo "$RUNNER_TEMP/crossref" >> "$GITHUB_PATH"
      - name: Build a real HTML document
        shell: bash
        run: |
          cargo build --locked
          bin="target/debug/omnidoc"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            bin="${bin}.exe"
          fi
          export HOME="$RUNNER_TEMP/home"
          export LOCALAPPDATA="$RUNNER_TEMP/local-app-data"
          export XDG_CONFIG_HOME="$RUNNER_TEMP/config"
          export XDG_DATA_HOME="$RUNNER_TEMP/data"
          mkdir -p \
            "$HOME/.local/share" \
            "$HOME/Library/Application Support" \
            "$LOCALAPPDATA" \
            "$XDG_CONFIG_HOME" \
            "$XDG_DATA_HOME"
          libs="$PWD/omnidoc-libs"
          "$bin" config --authors CI --lib "$libs" --force
          "$bin" doctor --strict --output html tests/fixtures/golden-book
          "$bin" build tests/fixtures/golden-book --to html --force
          test -s tests/fixtures/golden-book/build/golden-book.html

  msrv:
    name: Minimum supported Rust version
    runs-on: ubuntu-latest
    needs: crate-metadata
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ needs.crate-metadata.outputs.msrv }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
      - name: MSRV check
        run: cargo check --locked --all-targets

  audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  benchmark:
    name: Large Book benchmark
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: wang-borong/omnidoc-libs
          path: omnidoc-libs
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e # v1
        with:
          version: ${{ env.PANDOC_VERSION }}
      - name: Install benchmark dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libssl-dev pkg-config xz-utils
          curl --fail --location --retry 3 \
            --output /tmp/pandoc-crossref.tar.xz \
            "https://github.com/lierdakil/pandoc-crossref/releases/download/v${PANDOC_CROSSREF_VERSION}/pandoc-crossref-Linux-X64.tar.xz"
          tar --extract --xz --file /tmp/pandoc-crossref.tar.xz --directory /tmp pandoc-crossref
          sudo install -m 0755 /tmp/pandoc-crossref /usr/local/bin/pandoc-crossref
      - name: Benchmark cold and cached builds
        env:
          OMNIDOC_LIBS: ${{ github.workspace }}/omnidoc-libs
          OMNIDOC_BENCHMARK_DIR: ${{ github.workspace }}/${{ env.CICD_INTERMEDIATES_DIR }}/benchmark
        run: scripts/benchmark-large-book.sh
      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: large-book-benchmark-${{ github.run_attempt }}
          path: ${{ env.CICD_INTERMEDIATES_DIR }}/benchmark
          if-no-files-found: error
          retention-days: 30

  package:
    name: Package ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}
    needs: crate-metadata
    strategy:
      fail-fast: false
      matrix:
        job:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            deb_arch: amd64
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.job.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev fakeroot
      - name: Build release binary
        shell: bash
        run: cargo build --locked --release --target=${{ matrix.job.target }}
      - name: Run target tests
        shell: bash
        run: cargo test --locked --target=${{ matrix.job.target }}
      - name: Locate binary
        id: bin
        shell: bash
        run: |
          exe_suffix=""
          case "${{ matrix.job.target }}" in
            *-pc-windows-*) exe_suffix=".exe" ;;
          esac
          bin_name="${{ needs.crate-metadata.outputs.name }}${exe_suffix}"
          bin_path="target/${{ matrix.job.target }}/release/${bin_name}"
          echo "name=${bin_name}" >> "$GITHUB_OUTPUT"
          echo "path=${bin_path}" >> "$GITHUB_OUTPUT"
      - name: Package archive
        id: archive
        shell: bash
        run: |
          version="${{ needs.crate-metadata.outputs.version }}"
          base="${{ needs.crate-metadata.outputs.name }}-v${version}-${{ matrix.job.target }}"
          staging="${{ env.CICD_INTERMEDIATES_DIR }}/archive/${base}"
          mkdir -p "$staging"
          cp "${{ steps.bin.outputs.path }}" "$staging/"
          cp README.md CHANGELOG.md LICENSE release/omnidoc-libs.toml "$staging/"
          mkdir -p "${{ env.CICD_INTERMEDIATES_DIR }}/dist"
          if [[ "${{ matrix.job.archive }}" == "zip" ]]; then
            archive_name="${base}.zip"
            7z -y a "${{ env.CICD_INTERMEDIATES_DIR }}/dist/${archive_name}" "$staging"/*
          else
            archive_name="${base}.tar.gz"
            tar -C "${{ env.CICD_INTERMEDIATES_DIR }}/archive" -czf "${{ env.CICD_INTERMEDIATES_DIR }}/dist/${archive_name}" "$base"
          fi
          echo "name=${archive_name}" >> "$GITHUB_OUTPUT"
          echo "path=${{ env.CICD_INTERMEDIATES_DIR }}/dist/${archive_name}" >> "$GITHUB_OUTPUT"
      - name: Smoke test packaged binary
        shell: bash
        run: scripts/check-packaged-binary.sh "${{ steps.archive.outputs.path }}"
      - name: Package Debian artifact
        id: deb
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version="${{ needs.crate-metadata.outputs.version }}"
          package_name="${{ needs.crate-metadata.outputs.name }}"
          deb_name="${package_name}_${version}_${{ matrix.job.deb_arch }}.deb"
          deb_root="${{ env.CICD_INTERMEDIATES_DIR }}/deb/root"
          rm -rf "$deb_root"
          install -Dm755 "${{ steps.bin.outputs.path }}" "$deb_root/usr/bin/${{ steps.bin.outputs.name }}"
          install -Dm644 README.md "$deb_root/usr/share/doc/${package_name}/README.md"
          install -Dm644 CHANGELOG.md "$deb_root/usr/share/doc/${package_name}/CHANGELOG.md"
          install -Dm644 LICENSE "$deb_root/usr/share/doc/${package_name}/copyright"
          install -Dm644 release/omnidoc-libs.toml "$deb_root/usr/share/doc/${package_name}/omnidoc-libs.toml"
          mkdir -p "$deb_root/DEBIAN"
          cat > "$deb_root/DEBIAN/control" <<EOF
          Package: ${package_name}
          Version: ${version}
          Section: utils
          Priority: optional
          Maintainer: ${{ needs.crate-metadata.outputs.maintainer }}
          Homepage: ${{ needs.crate-metadata.outputs.homepage }}
          Architecture: ${{ matrix.job.deb_arch }}
          Description: OmniDoc document build tool.
           Rust + Pandoc Markdown + LaTeX document build and publishing CLI.
          EOF
          fakeroot dpkg-deb --build "$deb_root" "${{ env.CICD_INTERMEDIATES_DIR }}/dist/${deb_name}"
          echo "name=${deb_name}" >> "$GITHUB_OUTPUT"
          echo "path=${{ env.CICD_INTERMEDIATES_DIR }}/dist/${deb_name}" >> "$GITHUB_OUTPUT"
      - name: Upload archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: ${{ steps.archive.outputs.path }}
      - name: Upload Debian package
        if: steps.deb.outputs.path
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.deb.outputs.name }}
          path: ${{ steps.deb.outputs.path }}

  release-smoke:
    name: Installed release Golden Book
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - package
      - golden-book
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
      - uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e # v1
        with:
          version: ${{ env.PANDOC_VERSION }}
      - name: Install release smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y epubcheck jq ripgrep unzip xz-utils
          curl --fail --location --retry 3 \
            --output /tmp/pandoc-crossref.tar.xz \
            "https://github.com/lierdakil/pandoc-crossref/releases/download/v${PANDOC_CROSSREF_VERSION}/pandoc-crossref-Linux-X64.tar.xz"
          tar --extract --xz --file /tmp/pandoc-crossref.tar.xz --directory /tmp pandoc-crossref
          sudo install -m 0755 /tmp/pandoc-crossref /usr/local/bin/pandoc-crossref
      - name: Install release-bound library and build Golden Book
        shell: bash
        run: |
          mapfile -t archives < <(find artifacts -type f -name '*x86_64-unknown-linux-gnu.tar.gz' -print)
          test "${#archives[@]}" -eq 1
          archive="${archives[0]}"
          mkdir -p /tmp/omnidoc-release
          tar -xzf "$archive" -C /tmp/omnidoc-release
          bin="$(find /tmp/omnidoc-release -type f -name omnidoc -print -quit)"
          test -x "$bin"
          OMNIDOC_BIN="$bin" scripts/check-release-install.sh

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - all-jobs
      - golden-pdf
      - package
      - release-smoke
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish release artifacts
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
